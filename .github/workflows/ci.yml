name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Run backend tests
        working-directory: server
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-1234567890-test-secret
          JWT_EXPIRES_IN: 1d
          ADMIN_EMAIL: admin@system.com
          ADMIN_PASSWORD: admin123secure
          CLIENT_URL: http://localhost:3000
          AI_API_URL: http://127.0.0.1:5001
          ETH_RPC_URL: http://127.0.0.1:8545
          ETH_PRIVATE_KEY: 0x1111111111111111111111111111111111111111111111111111111111111111
          ETH_CONTRACT_ADDRESS: 0x1111111111111111111111111111111111111111
          STORAGE_PROVIDER: local
        run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          VITE_API_BASE_URL: http://localhost:5000/api
          VITE_SOCKET_URL: http://localhost:5000
        run: npm run build

  ai-module-check:
    name: AI Module Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI dependencies
        working-directory: ai-module
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python syntax
        run: |
          python - <<'PY'
          import pathlib
          for path in pathlib.Path("ai-module/src").rglob("*.py"):
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
          print("ai-module syntax ok")
          PY
